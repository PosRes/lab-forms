<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Records Viewer — ISO 17025:2017</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>


<link rel="stylesheet" href="theme.css">
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(r => console.log('[SW] registered', r.scope))
      .catch(e => console.warn('[SW] failed', e));
  });
}
</script>
</head>
<body>
<div class="main-container">
  <div class="section-title scroll-animate delay-1" style="justify-content: space-between;">
    <div>
      <h1>Lab Records Viewer</h1>
      <p>ISO 17025:2017 — Submitted Entries</p>
    </div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
      <div class="doc-ref">
        <div><strong>REF:</strong> ISO 17025:2017 §6.4</div>
        <div><strong>REV:</strong> 01</div>
      </div>
      <button class="load-btn-main load-btn-mor" id="load-btn" onclick="loadRecords()">
        <span class="btn-icon">⟳</span><div class="spinner"></div>Refresh Records
      </button>
    </div>
  </div>

  <div class="tab-bar scroll-animate delay-2" style="display:flex; gap:12px; margin-bottom:24px; overflow-x:auto; padding-bottom:8px;">
    <button class="btn btn-ghost" style="border-radius:20px; white-space:nowrap;" active-mor" id="tab-mor" onclick="switchTab('MOR Records')">
      🧫 Media Opening Records<span class="badge badge-pending" style="margin-left:8px;"  id="tab-count-mor">0</span>
    </button>
    <button class="btn btn-ghost" style="border-radius:20px; white-space:nowrap;"" id="tab-rsr" onclick="switchTab('RSR Records')">
      🦠 Reference Strain Records<span class="badge badge-pending" style="margin-left:8px;"  id="tab-count-rsr">0</span>
    </button>
    <button class="btn btn-ghost" style="border-radius:20px; white-space:nowrap;"" id="tab-eql" onclick="switchTab('Equipment Log')">
      ⚙️ Equipment Log<span class="badge badge-pending" style="margin-left:8px;"  id="tab-count-eql">0</span>
    </button>

  </div>

  <div class="glass-panel toolbar scroll-animate delay-3" style="display:flex; flex-wrap:wrap; gap:16px; align-items:center; padding:16px 20px; margin-bottom:24px; justify-content:space-between;">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="input-base" id="search" style="width:100%; max-width:300px;"  placeholder="Search records…" oninput="filterRecords()">
    </div>
    <!-- Filters -->
    <div class="search-filters">
      <select id="filter-eq-type" class="input-base" onchange="filterRecords()" style="display:none;min-width:180px;">
        <option value="">All Equipment</option>
        <option value="autoclave">Autoclave</option>
        <option value="incubator">Incubator</option>
        <option value="refrigerator">Refrigerator</option>
        <option value="biosafety cabinet">Biosafety Cabinet</option>
        <option value="waterbath">Waterbath</option>
        <option value="colony counter">Colony Counter</option>
        <option value="analytical balance">Analytical Balance</option>
        <option value="microscope">Microscope</option>
      </select>
      <select id="filter-disposition" class="input-base" style="max-width:200px;" onchange="filterRecords()">
        <option value="">All Dispositions</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
        <option value="conditional">Conditional</option>
      </select>
    </div>
    <span class="count-badge" id="count-badge">0 records</span>
    <span class="last-loaded" id="last-loaded"></span>
  </div>

  <div id="content" class="scroll-animate delay-4">
    <div class="state-box"><div class="icon">📋</div><div>Loading records…</div></div>
  </div>
</div>

<!-- Delete modal -->
<div class="modal-backdrop" id="delete-modal">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <h3>Delete this record?</h3>
    <p>This will permanently remove the record from your Google Sheet. This action cannot be undone.</p>
    <div class="modal-record-id" id="modal-record-id"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-delete" id="confirm-delete-btn" onclick="confirmDelete()">Yes, Delete</button>
    </div>
  </div>
</div>

<!-- Edit drawer -->
<div class="edit-backdrop" style="display:none; position:fixed; inset:0; background:rgba(255,255,255,0.5); backdrop-filter:blur(10px); z-index:900;"  id="edit-backdrop" onclick="closeEditDrawer()"></div>
<div class="edit-drawer glass-panel" style="position:fixed; top:0; right:-100%; width:min(600px,100vw); height:100vh; z-index:901; transition:right 0.3s ease; display:flex; flex-direction:column; border-radius:0; border-left:1px solid rgba(255,255,255,0.8);"  id="edit-drawer">
  <div class="edit-drawer-header" style="display:flex; justify-content:space-between; padding:20px; border-bottom:1px solid rgba(0,0,0,0.05); background:rgba(255,255,255,0.5);"  id="edit-drawer-header">
    <div>
      <div class="edit-drawer-title" id="edit-drawer-title">Edit Record</div>
      <div class="edit-drawer-subtitle" id="edit-drawer-subtitle"></div>
    </div>
    <button class="close-drawer-btn" onclick="closeEditDrawer()">✕</button>
  </div>
  <div class="edit-drawer-body" style="flex:1; overflow-y:auto; padding:24px;"  id="edit-drawer-body"></div>
  <div class="edit-drawer-footer" style="padding:20px; border-top:1px solid rgba(0,0,0,0.05); background:rgba(255,255,255,0.5); display:flex; gap:12px;">
    <button class="btn btn-ghost" onclick="closeEditDrawer()">Cancel</button>
    <button class="btn btn-primary" id="save-edit-btn" onclick="saveEdit()">☁ Save Changes</button>
  </div>
</div>

<div id="toast"></div>

<script>
let allRecords=[],activeSheet='MOR Records',editingIdx=null,passRowCount=0;

// ── Performance cache ──
const sheetCache={};       // { sheetName: { records:[], fetchedAt:Date } }
const CACHE_TTL=60*1000;   // 60 seconds before background refresh

function saveCountsToStorage(){
  const counts={};
  Object.entries(sheetCache).forEach(([k,v])=>{ counts[k]=v.records.length; });
  try{ sessionStorage.setItem('labcache_counts',JSON.stringify(counts)); }catch(e){}
}
function loadCountsFromStorage(){
  try{
    const raw=sessionStorage.getItem('labcache_counts');
    if(raw){
      const counts=JSON.parse(raw);
      const countMap={'MOR Records':'tab-count-mor','RSR Records':'tab-count-rsr','Equipment Log':'tab-count-eql'};
      Object.entries(counts).forEach(([sheet,n])=>{
        const el=document.getElementById(countMap[sheet]);
        if(el) el.textContent=n;
      });
    }
  }catch(e){}
}

window.addEventListener('load',()=>{
  loadCountsFromStorage();
  loadBothCounts();
  loadRecords();
});

async function loadBothCounts(){
  try{
    const sheetNames=['MOR Records','RSR Records','Equipment Log'];
    const countIds=['tab-count-mor','tab-count-rsr','tab-count-eql'];
    const results=await Promise.all(sheetNames.map(s=>supabaseFetchRecords(s).catch(()=>null)));
    results.forEach((records,i)=>{
      if(records){
        document.getElementById(countIds[i]).textContent=records.length;
        sheetCache[sheetNames[i]]={records, fetchedAt:Date.now()};
      } else {
        document.getElementById(countIds[i]).textContent='—';
      }
    });
    saveCountsToStorage();
  }catch(e){}
}

function updateFilterOptions(sheet){
  const isEql=sheet==='Equipment Log';
  const eqFilter = document.getElementById('filter-eq-type');
  if (isEql) {
    document.getElementById('filter-disposition').innerHTML = `
      <option value="">All Statuses</option>
      <option value="operational">Operational</option>
      <option value="requires maintenance">Requires Maintenance</option>
      <option value="out of service">Out of Service</option>`;
    eqFilter.style.display = 'block';
  } else {
    document.getElementById('filter-disposition').innerHTML = `
      <option value="">All Dispositions</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
      <option value="conditional">Conditional</option>`;
    eqFilter.style.display = 'none';
  }
}
function switchTab(sheet){
  activeSheet=sheet;
  const tabMap={'MOR Records':'tab-mor','RSR Records':'tab-rsr','Equipment Log':'tab-eql'};
  const activeClass={'MOR Records':'active-mor','RSR Records':'active-rsr','Equipment Log':'active-eql'};
  Object.entries(tabMap).forEach(([s,id])=>{
    const el = document.getElementById(id);
    if(el) el.className='tab-btn'+(s===sheet?' '+activeClass[s]:'');
  });
  const isMor=sheet==='MOR Records';const isRsr=sheet==='RSR Records';
  const isEql=sheet==='Equipment Log';
  document.getElementById('load-btn').className=`load-btn-main ${isMor?'load-btn-mor':isRsr?'load-btn-rsr':'load-btn-eql'}`;
  document.getElementById('filter-disposition').value='';
  document.getElementById('search').value='';
  loadRecords();
}

function showToast(msg,isError){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=isError?'#8b3a1e':'#1d4e5f';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);
}

async function loadRecords(){
  const btn=document.getElementById('load-btn');
  const cached=sheetCache[activeSheet];
  const isFresh=cached&&(Date.now()-cached.fetchedAt<CACHE_TTL);

  // If we have cached data, render it INSTANTLY (no spinner)
  if(cached){
    allRecords=cached.records;
    renderRecords(allRecords);
    const tabCountMap={'MOR Records':'tab-count-mor','RSR Records':'tab-count-rsr','Equipment Log':'tab-count-eql'};
    document.getElementById(tabCountMap[activeSheet]||'tab-count-mor').textContent=allRecords.length;
    document.getElementById('last-loaded').textContent='Cached '+new Date(cached.fetchedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    // If cache is fresh enough, skip network fetch
    if(isFresh){ return; }
    // Otherwise, refresh in background (no spinner, no blocking)
    fetchSheetInBackground(activeSheet);
    return;
  }

  // No cache — full blocking fetch with spinner
  btn.classList.add('loading');btn.disabled=true;
  document.getElementById('content').innerHTML='<div class="state-box"><div class="icon">⏳</div><div>Fetching records…</div></div>';
  try{
    allRecords=await supabaseFetchRecords(activeSheet);
    sheetCache[activeSheet]={records:allRecords,fetchedAt:Date.now()};
    saveCountsToStorage();
    renderRecords(allRecords);
    const now=new Date();
    document.getElementById('last-loaded').textContent='Updated '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    const tabCountMap={'MOR Records':'tab-count-mor','RSR Records':'tab-count-rsr','Equipment Log':'tab-count-eql'};
    document.getElementById(tabCountMap[activeSheet]||'tab-count-mor').textContent=allRecords.length;
    showToast(`✓ ${allRecords.length} record(s) loaded`);
  }catch(err){
    document.getElementById('content').innerHTML=`<div class="state-box"><div class="icon">⚠️</div><div>Failed to load</div><p>${err.message}</p></div>`;
    showToast('✗ Load failed — '+err.message,true);
  }finally{btn.classList.remove('loading');btn.disabled=false;}
}

// Background refresh — updates cache and UI silently
async function fetchSheetInBackground(sheet){
  try{
    const records=await supabaseFetchRecords(sheet);
    sheetCache[sheet]={records,fetchedAt:Date.now()};
    saveCountsToStorage();
    if(activeSheet===sheet){
      allRecords=records;
      renderRecords(allRecords);
      const tabCountMap={'MOR Records':'tab-count-mor','RSR Records':'tab-count-rsr','Equipment Log':'tab-count-eql'};
      document.getElementById(tabCountMap[sheet]||'tab-count-mor').textContent=allRecords.length;
      document.getElementById('last-loaded').textContent='Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    }
  }catch(e){}
}

function filterRecords(){
  const q=document.getElementById('search').value.toLowerCase();
  const dis=document.getElementById('filter-disposition').value.toLowerCase();
  const eqt=document.getElementById('filter-eq-type')?document.getElementById('filter-eq-type').value.toLowerCase():'';
  const isEql=activeSheet==='Equipment Log';
  const filterField=isEql?'Overall Status':'QC Disposition';
  const filtered=allRecords.filter(r=>{
    const ms=!q||Object.values(r).some(v=>String(v||'').toLowerCase().includes(q));
    const md=!dis||String(r[filterField]||'').toLowerCase()===dis;
    const me=!eqt||!isEql||(String(r['Equipment Type']||'').toLowerCase()===eqt);
    return ms&&md&&me;
  });
  renderRecords(filtered);
}

function renderRecords(records){
  const content=document.getElementById('content');
  document.getElementById('count-badge').textContent=`${records.length} record${records.length!==1?'s':''}`;
  if(!records.length){content.innerHTML='<div class="state-box"><div class="icon">🔍</div><div>No records found</div><p>Try adjusting your search or filter</p></div>';return;}
  const sorted=[...records].sort((a,b)=>new Date(b['Saved At']||0)-new Date(a['Saved At']||0));
  const isMor=activeSheet==='MOR Records';const isRsr=activeSheet==='RSR Records';
  const isEqlSheet=activeSheet==='Equipment Log';
  content.innerHTML=`<div class="records-grid">${sorted.map((r,i)=>isMor?cardMOR(r,i):isRsr?cardRSR(r,i):cardGeneric(r,i)).join('')}</div>`;
}

function v(x){return(x===null||x===undefined||x==='')?'—':String(x);}
function vcls(x){const s=String(x||'').toLowerCase();return (s==='pass'||s==='approved'||s==='ok')?'approved':(s==='fail'||s==='rejected')?'rejected':'';}
function row(k,x){
  if(!x||x==='—')return'';
  const cls=vcls(x);const s=String(x);
  const d=cls==='approved'?'✓ '+s.toUpperCase():cls==='rejected'?'✗ '+s.toUpperCase():s;
  return`<div class="detail-row" style="display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px dashed rgba(0,0,0,0.05); font-size:13px;"><span class="detail-key" style="color:var(--text-muted); font-weight:600;">${k}</span><span class="detail-val" style="font-weight:600; color:var(--text-main);"  ${cls}">${d}</span></div>`;
}
function badge(x){
  if(!x)return'';const s=String(x).toLowerCase();
  if(s==='approved')return'<span class="badge badge-approved">✓ APPROVED</span>';
  if(s==='rejected')return'<span class="badge badge-fail">✗ REJECTED</span>';
  if(s==='conditional')return'<span class="badge badge-conditional">⚠ CONDITIONAL</span>';
  return`<span class="badge badge-pending">${x}</span>`;
}
function savedDate(x){if(!x)return'—';try{return new Date(x).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return x;}}
function fmtDate(x){if(!x||x==='—')return'—';try{const d=new Date(x);if(isNaN(d))return x;return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return x;}}
function formatRunLog(json){
  let runs=[];try{runs=JSON.parse(json);}catch(e){return`<span style="color:var(--text-muted);font-size:11px;">${json}</span>`;}
  if(!runs.length)return'<span style="color:var(--text-muted);">No runs recorded</span>';
  const rows=runs.map(r=>`
    <tr>
      <td style="font-weight:600;color:var(--accent);">#${r.num}</td>
      <td>${r.load||'—'}</td>
      <td style="font-family:var(--mono);font-size:11px;">${r.cycle||'—'}</td>
      <td style="font-family:var(--mono);">${r.start||'—'} – ${r.end||'—'}</td>
      <td style="font-family:var(--mono);">${r.temp||'—'}°C / ${r.pressure||'—'}kPa</td>
      <td>${r.chem||'—'}</td>
      <td>${r.bi||'—'}</td>
      <td style="font-weight:600;color:${r.result&&r.result.toLowerCase().startsWith('pass')?'#1a4d2e':'#8b1a1a'}">${r.result||'—'}</td>
    </tr>`).join('');
  return`<div style="overflow-x:auto;margin-top:4px;">
    <table style="width:100%;border-collapse:collapse;font-size:11px;">
      <thead><tr style="background:#f0ece6;color:var(--text-muted);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;">
        <th style="padding:5px 6px;text-align:left;">#</th>
        <th style="padding:5px 6px;text-align:left;">Load</th>
        <th style="padding:5px 6px;text-align:left;">Cycle</th>
        <th style="padding:5px 6px;text-align:left;">Time</th>
        <th style="padding:5px 6px;text-align:left;">Temp/Pressure</th>
        <th style="padding:5px 6px;text-align:left;">Chem</th>
        <th style="padding:5px 6px;text-align:left;">BI</th>
        <th style="padding:5px 6px;text-align:left;">Result</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function cardMOR(r,idx){
  return`<div class="glass-panel record-card glass-panel-hover" style="margin-bottom:20px; overflow:hidden;" mor-card" id="card-${idx}">
    <div class="card-header" style="padding:20px 24px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="toggleCard(${idx})">
      <div class="card-header-left" style="display:flex; flex-direction:column; gap:6px;">
        <span class="record-id" style="font-family:var(--mono); color:var(--primary); font-weight:700; font-size:12px; background:var(--primary-light); padding:2px 8px; border-radius:4px; align-self:flex-start;">${v(r['Record ID'])}</span>
        <span class="media-name" style="font-size:18px; font-weight:700;">${v(r['Media Name / Type'])||'Unnamed'}</span>
        <span class="card-meta" style="font-size:12px; color:var(--text-muted); font-family:var(--mono);">Lot: ${v(r['Lot / Batch Number'])} &nbsp;|&nbsp; Opened: ${v(r['Date Opened'])} &nbsp;|&nbsp; Saved: ${savedDate(r['Saved At'])}</span>
      </div>
      <div class="card-badges" style="display:flex; gap:8px; align-items:center;">
        ${badge(r['QC Disposition'])}
        ${r['Physical Result']?`<span class="badge ${vcls(r['Physical Result'])==='approved'?'badge-pass':'badge-fail'}">${vcls(r['Physical Result'])==='approved'?'✓ PHYS OK':'✗ PHYS FAIL'}</span>`:''}
        <span class="expand-icon">⌄</span>
      </div>
    </div>
    <div class="card-detail" style="display:none; padding:20px 24px; border-top:1px solid rgba(0,0,0,0.05); background:rgba(255,255,255,0.3);"
      <div class="detail-sections" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:24px;">
        <div class="detail-section" style="display:flex; flex-direction:column; gap:8px;"><h4>Identification</h4>${row('Media Name',r['Media Name / Type'])}${row('Catalog No.',r['Catalog No.'])}${row('Supplier',r['Manufacturer / Supplier'])}${row('Lot',r['Lot / Batch Number'])}${row('Container',r['Container Size'])}${row('Intended Use',r['Intended Use'])}</div>
        <div class="detail-section" style="display:flex; flex-direction:column; gap:8px;"><h4>Dates</h4>${row('Receipt',r['Date of Receipt'])}${row('Opened',r['Date Opened'])}${row('Mfr. Expiry',r['Expiration Date (Mfr)'])}${row('In-House Expiry',r['In-House Expiry'])}${row('Prepared',r['Prepared / Poured Date'])}${row('QC Test Date',r['Date of QC Test'])}</div>
        <div class="detail-section" style="display:flex; flex-direction:column; gap:8px;"><h4>Storage</h4>${row('Location',r['Storage Location'])}${row('Temp at Receipt',r['Temp at Receipt (°C)']?r['Temp at Receipt (°C)']+'°C':'')}${row('Humidity',r['Humidity Condition'])}${row('Equipment ID',r['Storage Equipment ID'])}</div>
        <div class="detail-section" style="display:flex; flex-direction:column; gap:8px;"><h4>Physical Inspection</h4>${row('Result',r['Physical Result'])}<div class="detail-row" style="display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px dashed rgba(0,0,0,0.05); font-size:13px;"><span class="detail-key" style="color:var(--text-muted); font-weight:600;">Defects</span><span class="detail-val" style="font-weight:600; color:var(--text-main);"  ${r['Defects Observed']&&r['Defects Observed']!=='None'?'defect':''}">${v(r['Defects Observed'])}</span></div>${row('Action',r['Action if Unsatisfactory'])}</div>
        <div class="detail-section" style="display:flex; flex-direction:column; gap:8px;"><h4>QC — Growth Promotion</h4>${row('Organism 1',r['GPT Organism 1'])}${row('Result 1',r['GPT Result 1'])}${row('Organism 2',r['GPT Organism 2'])}${row('Result 2',r['GPT Result 2'])}${row('Organism 3',r['GPT Organism 3'])}${row('Result 3',r['GPT Result 3'])}${row('Sterility',r['Sterility Result'])}</div>
        <div class="detail-section" style="display:flex; flex-direction:column; gap:8px;"><h4>Disposition & Sign-Off</h4>${row('Disposition',r['QC Disposition'])}${row('QC Ref',r['QC Report Ref'])}${row('Analyst',r['Analyst Name'])}${row('QC Verifier',r['QC Verifier Name'])}${row('Supervisor',r['Supervisor Name'])}</div>
      </div>
      <div class="card-actions" style="display:flex; gap:12px; margin-top:24px; padding-top:20px; border-top:1px solid rgba(0,0,0,0.05);">
        <button class="btn btn-primary" onclick="downloadPDF_MOR(${idx})">⬇ PDF</button>
        <button class="btn btn-edit"    onclick="openEditDrawer(${idx})">✏ Edit</button>
        <button class="btn btn-ghost"   onclick="copyRecord(${idx})">⎘ Copy</button>
        <button class="btn btn-delete"  onclick="deleteRecord(${idx})">🗑 Delete</button>
      </div>
    </div>
  </div>`;
}

function cardRSR(r,idx){
  let passHTML='';
  try{
    const rows=JSON.parse(r['Passage Log']||'[]');
    if(rows.length){passHTML=`<table class="passage-mini"><thead><tr><th>P#</th><th>Date</th><th>From</th><th>Medium</th><th>Incubation</th><th>Result</th><th>Analyst</th></tr></thead><tbody>${rows.map(p=>`<tr><td>${p.num||'—'}</td><td>${p.date||'—'}</td><td>${p.from||'—'}</td><td>${p.medium||'—'}</td><td>${p.incubation||'—'}</td><td class="${String(p.result||'').toLowerCase()==='pass'?'p-pass':String(p.result||'').toLowerCase()==='fail'?'p-fail':''}">${p.result||'—'}</td><td>${p.analyst||'—'}</td></tr>`).join('')}</tbody></table>`;}

function downloadPDF_Generic(idx){
  if(!window.jspdf){showToast('⚠ PDF library not ready — try again in a moment',true);return;}
  const sorted=[...allRecords].sort((a,b)=>new Date(b['Saved At']||0)-new Date(a['Saved At']||0));
  const r=sorted[idx];if(!r)return;
  const isEql=activeSheet==='Equipment Log';
  const rgb=isEql?[26,77,46]:[92,59,26];
  const title=isEql?'Equipment Monitoring Log':'Autoclave Run Log';
  const form=isEql?'QC-EQL-001':'QC-ARL-001';
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight();
  const margin=14,colV=margin+72,colVW=pageW-colV-margin;let y=margin;
  function chk(h){if(y+h>pageH-margin){doc.addPage();y=margin;}}
  doc.setFillColor(...rgb);doc.rect(0,0,pageW,18,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text(title,margin,11);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(`ISO 17025:2017  |  ${form}  |  REV 01`,pageW-margin,11,{align:'right'});
  y=24;doc.setTextColor(100,100,100);doc.setFontSize(8);
  doc.text(`Record ID: ${r['Record ID']}`,margin,y);
  doc.text(`Generated: ${new Date().toLocaleString('en-GB')}`,pageW-margin,y,{align:'right'});y+=8;
  Object.entries(r).forEach(([k,vv])=>{
    if(k==='Saved At'||k==='sheet'||vv===null||vv===undefined||vv==='')return;
    const val=String(vv);
    const lines=doc.splitTextToSize(val,colVW);
    const rowH=Math.max(6,lines.length*5+2);chk(rowH+1);
    doc.setFillColor(250,249,247);doc.rect(margin,y-1,pageW-margin*2,rowH,'F');
    doc.setDrawColor(213,208,200);doc.rect(margin,y-1,pageW-margin*2,rowH,'S');
    doc.setTextColor(100,95,90);doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.text(k,margin+1,y+3.5);
    const vl=val.toLowerCase();
    if(vl.startsWith('pass')||vl==='operational'||vl.startsWith('yes')||vl.startsWith('dry')&&!vl.includes('no')) doc.setTextColor(26,77,46);
    else if(vl.startsWith('fail')||vl==='out of service'||vl.includes('reject')) doc.setTextColor(139,26,26);
    else doc.setTextColor(26,25,22);
    doc.setFont('helvetica','normal');doc.text(lines,colV,y+3.5);
    doc.line(colV-2,y-1,colV-2,y-1+rowH);y+=rowH+1;
  });
  const total=doc.internal.getNumberOfPages();
  for(let i=1;i<=total;i++){
    doc.setPage(i);doc.setFillColor(...rgb);doc.rect(0,pageH-8,pageW,8,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','normal');
    doc.text('CONTROLLED DOCUMENT — ISO 17025:2017 Compliant',margin,pageH-3);
    doc.text(`Page ${i} of ${total}`,pageW-margin,pageH-3,{align:'right'});
  }
  doc.save(`${String(r['Record ID']||'REC').replace(/[^a-zA-Z0-9-]/g,'_')}.pdf`);
  showToast('✓ PDF downloaded');
}

async function saveEdit(){
  if(editingIdx===null)return;
  const sorted=[...allRecords].sort((a,b)=>new Date(b['Saved At']||b['created_at']||0)-new Date(a['Saved At']||a['created_at']||0));
  const r=sorted[editingIdx];if(!r)return;
  const updated={...r};
  editRunSync();
  document.querySelectorAll('#edit-drawer-body [data-key]').forEach(el=>{updated[el.dataset.key]=el.value;});
  if(activeSheet==='RSR Records')updated['Passage Log']=JSON.stringify(collectPassageRows());
  const btn=document.getElementById('save-edit-btn');
  btn.textContent='⏳ Saving…';btn.disabled=true;
  try{
    const table=SHEET_TO_TABLE[activeSheet];
    // Build the row update: key columns + full data JSONB
    const rowUpdate={data:updated};
    if(table==='mor_records'){
      rowUpdate.media_name=updated['Media Name / Type']||null;
      rowUpdate.qc_disposition=updated['QC Disposition']||null;
      rowUpdate.analyst_name=updated['Analyst Name']||null;
    } else if(table==='rsr_records'){
      rowUpdate.organism_name=updated['Organism Name']||null;
      rowUpdate.qc_disposition=updated['QC Disposition']||null;
      rowUpdate.analyst_name=updated['Analyst Name']||null;
    } else {
      rowUpdate.overall_status=updated['Overall Status']||null;
      rowUpdate.analyst_name=updated['Analyst Name']||null;
    }
    await supabaseUpdateRecord(table, r['Record ID']||r['record_id'], rowUpdate);
    const gi=allRecords.indexOf(r);
    if(gi>=0)allRecords[gi]=updated;
    sheetCache[activeSheet]={records:[...allRecords],fetchedAt:Date.now()};
    saveCountsToStorage();
    closeEditDrawer();filterRecords();
    showToast('✓ Record updated successfully');
  }catch(e){showToast('✗ Update failed — '+(e.message||'unknown error'),true);}
  finally{btn.textContent='☁ Save Changes';btn.disabled=false;}
}

let pendingDeleteIdx=null;

  const sorted=[...allRecords].sort((a,b)=>new Date(b['Saved At']||0)-new Date(a['Saved At']||0));

async function confirmDelete(){
  if(pendingDeleteIdx===null)return;
  const sorted=[...allRecords].sort((a,b)=>new Date(b['Saved At']||b['created_at']||0)-new Date(a['Saved At']||a['created_at']||0));
  const r=sorted[pendingDeleteIdx];if(!r)return;
  const btn=document.getElementById('confirm-delete-btn');
  btn.textContent='⏳ Deleting…';btn.disabled=true;
  try{
    const table=SHEET_TO_TABLE[activeSheet];
    await supabaseDeleteRecord(table, r['Record ID']||r['record_id']);
    allRecords=allRecords.filter(rec=>(rec['Record ID']||rec['record_id'])!==(r['Record ID']||r['record_id']));
    sheetCache[activeSheet]={records:[...allRecords],fetchedAt:Date.now()};
    saveCountsToStorage();
    closeDeleteModal();filterRecords();
    const tcm2={'MOR Records':'tab-count-mor','RSR Records':'tab-count-rsr','Equipment Log':'tab-count-eql'};

}

function copyRecord(idx){
  const sorted=[...allRecords].sort((a,b)=>new Date(b['Saved At']||0)-new Date(a['Saved At']||0));

// ── PDF ──
function makePDF(r,title,formCode,sections,rgb){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pageW=doc.internal.pageSize.getWidth(),pageH=doc.internal.pageSize.getHeight();
  const margin=14,colV=margin+72,colVW=pageW-colV-margin;let y=margin;
  function chk(h){if(y+h>pageH-margin){doc.addPage();y=margin;}}
  doc.setFillColor(...rgb);doc.rect(0,0,pageW,18,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text(title,margin,11);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(`ISO 17025:2017  |  ${formCode}  |  REV 01`,pageW-margin,11,{align:'right'});
  y=24;doc.setTextColor(100,100,100);doc.setFontSize(8);
  doc.text(`Record ID: ${r['Record ID']}`,margin,y);
  doc.text(`Generated: ${new Date().toLocaleString('en-GB')}`,pageW-margin,y,{align:'right'});y+=8;
  sections.forEach(sec=>{
    chk(14);
    const lr=Math.min(rgb[0]+180,240),lg=Math.min(rgb[1]+190,245),lb=Math.min(rgb[2]+190,245);
    doc.setFillColor(lr,lg,lb);doc.rect(margin,y,pageW-margin*2,7,'F');
    doc.setTextColor(...rgb);doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.text(sec.title,margin+2,y+5);y+=10;
    sec.keys.forEach(key=>{
      let raw=r[key];
      if(key==='Passage Log'&&raw){try{raw=JSON.parse(raw).map(p=>`P${p.num}|${p.date}|${p.medium}|${p.incubation}|${p.result}|${p.analyst}`).join('\n');}catch(e){}}
      const val=(raw===null||raw===undefined||raw==='')?'—':String(raw);
      const lines=doc.splitTextToSize(val,colVW);
      const rowH=Math.max(6,lines.length*5+2);chk(rowH+1);
      doc.setFillColor(250,249,247);doc.rect(margin,y-1,pageW-margin*2,rowH,'F');
      doc.setDrawColor(213,208,200);doc.rect(margin,y-1,pageW-margin*2,rowH,'S');
      doc.setTextColor(100,95,90);doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.text(key,margin+1,y+3.5);
      const vl=val.toLowerCase();
      if(vl==='pass'||vl==='approved')doc.setTextColor(26,92,53);
      else if(vl==='fail'||vl==='rejected')doc.setTextColor(139,58,30);
      else doc.setTextColor(26,25,22);
      doc.setFont('helvetica','normal');doc.text(lines,colV,y+3.5);
      doc.line(colV-2,y-1,colV-2,y-1+rowH);y+=rowH+1;
    });y+=3;
  });
  const total=doc.internal.getNumberOfPages();
  for(let i=1;i<=total;i++){
    doc.setPage(i);doc.setFillColor(...rgb);doc.rect(0,pageH-8,pageW,8,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','normal');
    doc.text('CONTROLLED DOCUMENT — ISO 17025:2017 Compliant',margin,pageH-3);
    doc.text(`Page ${i} of ${total}`,pageW-margin,pageH-3,{align:'right'});
  }
  doc.save(`${String(r['Record ID']||'REC').replace(/[^a-zA-Z0-9-]/g,'_')}.pdf`);
  showToast('✓ PDF downloaded');
}

      ${F('Cal Weight (g)','Cal Weight (g)','number')}
      ${F('Balance Reading (g)','Balance Reading (g)','number')}
      ${F('Calibration Result','Calibration Result','select',['Pass — Within Tolerance','Fail — Out of Tolerance'])}

      ${F('Microscope Notes','Notes','textarea',null,true)}
    </div></div>`;
  } else if(isBsc){
    sec2=`
    <div class="edit-section"><div class="edit-section-title" style="font-size:12px; font-weight:700; color:var(--primary); text-transform:uppercase; margin-bottom:12px; margin-top:24px; padding-bottom:8px; border-bottom:1px solid rgba(0,0,0,0.05);"  eql">02 — Biosafety Cabinet Status</div>
    <div class="edit-field" style="display:flex; flex-direction:column; gap:4px;" -grid" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">

      ${F('Sash Position','Sash Position','select',['Correct Operating Height','Incorrect'])}
      ${F('Airflow Indicator','Airflow','select',['Normal','Abnormal','Not Checked'])}

  return`
  <div class="edit-section"><div class="edit-section-title" style="font-size:12px; font-weight:700; color:var(--primary); text-transform:uppercase; margin-bottom:12px; margin-top:24px; padding-bottom:8px; border-bottom:1px solid rgba(0,0,0,0.05);"  eql">01 — Record Information</div>
  <div class="edit-field" style="display:flex; flex-direction:column; gap:4px;" -grid" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
    ${F('Equipment Type','Equipment Type','select',['Autoclave','Incubator','Refrigerator','BSC'])}

  ${sec2}
  <div class="edit-section"><div class="edit-section-title" style="font-size:12px; font-weight:700; color:var(--primary); text-transform:uppercase; margin-bottom:12px; margin-top:24px; padding-bottom:8px; border-bottom:1px solid rgba(0,0,0,0.05);"  eql">03 — Overall Status</div>
  <div class="edit-field" style="display:flex; flex-direction:column; gap:4px;" -grid" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">

// ── Edit Drawer — Run Log table ──
let editRunCount = 0;
function editRunInit(json){
  editRunCount = 0;
  const tbody = document.getElementById('edit-run-tbody');
  if(!tbody) return;
  let runs = [];
  try { runs = JSON.parse(json||'[]'); } catch(e){}
  tbody.innerHTML = '';
  runs.forEach(r => editRunAddRow(r));
  if(!runs.length) editRunAddRow();
  editRunSync();
}
function editRunAddRow(p){
  editRunCount++;
  const n = editRunCount;
  const tbody = document.getElementById('edit-run-tbody');
  if(!tbody) return;
  const tr = document.createElement('tr');
  tr.id = `er-row-${n}`;
  tr.style.borderBottom = '1px solid #ece8e0';
  tr.innerHTML = `
    <td style="padding:3px 4px;font-size:11px;color:var(--text-muted);font-weight:600;">${n}</td>
    <td style="padding:3px 2px;"><input type="text" id="er-load-${n}" value="${p?.load||''}" placeholder="e.g. Media" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:3px;font-size:12px;"></td>
    <td style="padding:3px 2px;"><select id="er-cycle-${n}" style="width:100%;padding:4px 4px;border:1px solid var(--border);border-radius:3px;font-size:11px;">
      <option value="">—</option>
      <option ${p?.cycle==='Gravity (121°C/15 min)'?'selected':''}>Gravity (121°C/15 min)</option>
      <option ${p?.cycle==='Pre-Vacuum (134°C/4 min)'?'selected':''}>Pre-Vacuum (134°C/4 min)</option>
      <option ${p?.cycle==='Liquid (121°C/20 min)'?'selected':''}>Liquid (121°C/20 min)</option>
    </select></td>
    <td style="padding:3px 2px;"><input type="time" id="er-start-${n}" value="${p?.start||''}" style="width:100%;padding:4px 3px;border:1px solid var(--border);border-radius:3px;font-size:11px;"></td>
    <td style="padding:3px 2px;"><input type="time" id="er-end-${n}" value="${p?.end||''}" style="width:100%;padding:4px 3px;border:1px solid var(--border);border-radius:3px;font-size:11px;"></td>
    <td style="padding:3px 2px;"><input type="number" id="er-temp-${n}" value="${p?.temp||''}" placeholder="121" style="width:100%;padding:4px 3px;border:1px solid var(--border);border-radius:3px;font-size:11px;"></td>
    <td style="padding:3px 2px;"><input type="number" id="er-pressure-${n}" value="${p?.pressure||''}" placeholder="103" style="width:100%;padding:4px 3px;border:1px solid var(--border);border-radius:3px;font-size:11px;"></td>
    <td style="padding:3px 2px;"><select id="er-chem-${n}" style="width:100%;padding:4px 3px;border:1px solid var(--border);border-radius:3px;font-size:11px;">
      <option value="">—</option>
      <option ${p?.chem==='Pass'?'selected':''}>Pass</option>
      <option ${p?.chem==='Fail'?'selected':''}>Fail</option>
      <option ${p?.chem==='Not Used'?'selected':''}>Not Used</option>
    </select></td>
    <td style="padding:3px 2px;"><select id="er-bi-${n}" style="width:100%;padding:4px 3px;border:1px solid var(--border);border-radius:3px;font-size:11px;">
      <option value="">—</option>
      <option ${p?.bi==='Pass'?'selected':''}>Pass</option>
      <option ${p?.bi==='Fail'?'selected':''}>Fail</option>
      <option ${p?.bi==='Pending'?'selected':''}>Pending</option>
      <option ${p?.bi==='Not Tested'?'selected':''}>Not Tested</option>
    </select></td>
    <td style="padding:3px 2px;"><select id="er-result-${n}" style="width:100%;padding:4px 3px;border:1px solid var(--border);border-radius:3px;font-size:11px;">
      <option value="">—</option>
      <option ${p?.result==='Pass'?'selected':''}>Pass</option>
      <option ${p?.result==='Fail — Cycle Aborted'?'selected':''}>Fail — Cycle Aborted</option>
      <option ${p?.result==='Fail — Indicators Failed'?'selected':''}>Fail — Indicators Failed</option>
    </select></td>
    <td style="padding:3px 2px;"><button type="button" onclick="editRunDelRow(${n})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:2px 5px;">✕</button></td>
  `;
  tbody.appendChild(tr);
}
function editRunDelRow(n){
  const r = document.getElementById(`er-row-${n}`);
  if(r) r.remove();
  editRunSync();
}
function editRunSync(){
  const rows = [];
  document.querySelectorAll('#edit-run-tbody tr').forEach(tr=>{
    const n = tr.id.replace('er-row-','');
    const load = document.getElementById(`er-load-${n}`)?.value||'';
    if(!load.trim()) return;
    rows.push({
      num: rows.length+1, load,
      cycle: document.getElementById(`er-cycle-${n}`)?.value||'',
      start: document.getElementById(`er-start-${n}`)?.value||'',
      end:   document.getElementById(`er-end-${n}`)?.value||'',
      temp:  document.getElementById(`er-temp-${n}`)?.value||'',
      pressure: document.getElementById(`er-pressure-${n}`)?.value||'',
      chem:  document.getElementById(`er-chem-${n}`)?.value||'',
      bi:    document.getElementById(`er-bi-${n}`)?.value||'',
      result:document.getElementById(`er-result-${n}`)?.value||''
    });
  });
  const hidden = document.getElementById('ef-Run_Log');
  if(hidden) hidden.value = JSON.stringify(rows);
}

</script>
<script>
// Preload jsPDF on first user interaction so PDF is ready when needed
(function(){
  function preload(){
    if(!window.jspdf){
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      document.head.appendChild(s);
    }
    ['mousedown','touchstart'].forEach(e=>document.removeEventListener(e,preload));
  }
  ['mousedown','touchstart'].forEach(e=>document.addEventListener(e,preload,{once:true}));
})();
</script>
<script src="animations.js"></script>
